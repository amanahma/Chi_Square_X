# Netlify deployment configuration for frontend
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA routing — all routes handled by index.html
[[redirects]]
  from = "/api/*"
  to = "https://chi-square-x.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
