# Render deployment configuration for backend

services:
  - type: web
    name: meet-ai-scribe-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: apt-get install -y chromium-browser --no-install-recommends; npm install
    startCommand: node src/index.js
    envVars:
      - key: CHROME_PATH
        value: /usr/bin/chromium-browser
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
